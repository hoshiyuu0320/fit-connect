# A string used to distinguish different Supabase projects on the same host.
project_id = "fit-connect"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# Email testing
[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "fitconnectmobile://login-callback"
additional_redirect_urls = [
  "fitconnectmobile://login-callback",
  "fitconnectmobile://**",
  "http://localhost:3000/**"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false
secure_password_change = false

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.apple]
enabled = false

[auth.external.google]
enabled = false

[analytics]
enabled = false

# Edge Functions の認証設定。
# どちらも verify_jwt=false（ゲートウェイで JWT 検証しない）。
# - parse-message-tags: DB Webhook から呼ばれ user JWT を持たないため必須で false
# - estimate-meal-nutrition: 関数内で Authorization ヘッダの JWT を自前検証するため false
# 注: この設定が無いと `supabase functions deploy` が verify_jwt=true をデフォルト適用し、
#     webhook が 401 で記録停止する事故になる（タスク2.5 デプロイ時の知見）。
[functions.parse-message-tags]
verify_jwt = false

[functions.estimate-meal-nutrition]
verify_jwt = false
